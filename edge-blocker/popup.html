<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bloqueador de Configurações</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; background: #0e0e16; font-family: 'Segoe UI', sans-serif; color: #fff; padding: 24px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #2a2a3a; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header p { font-size: 11px; color: #666; margin-top: 2px; }
    .status-bar { background: #1a1a28; border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12px; color: #4caf50; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; background: #1a1a28; border: 1px solid #2a2a3a; border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 8px; }
    input:focus { border-color: #1a6ef5; }
    button { width: 100%; padding: 10px; background: #1a6ef5; border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    button:hover { background: #1558cc; }
    .msg { font-size: 12px; margin-top: 8px; min-height: 16px; }
    .msg.ok { color: #4caf50; }
    .msg.erro { color: #ff4444; }
    .rodape { font-size: 11px; color: #444; text-align: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid #1a1a28; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:24px;">🔒</span>
    <div>
      <h1>Bloqueador de Configurações</h1>
      <p>Proteção de acesso para Edge</p>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    Proteção ativa
  </div>
  <div>
    <label>ALTERAR SENHA DE ADMINISTRADOR</label>
    <input type="password" id="senhaAtual" placeholder="Senha atual" />
    <input type="password" id="novaSenha" placeholder="Nova senha" />
    <input type="password" id="confirmaSenha" placeholder="Confirmar nova senha" />
    <button id="btnSalvar">Salvar Nova Senha</button>
    <div class="msg" id="msgSenha"></div>
  </div>
  <div class="rodape">Senha padrão inicial: <strong>admin123</strong></div>
  <script>
    document.getElementById("btnSalvar").addEventListener("click", () => {
      const atual = document.getElementById("senhaAtual").value;
      const nova = document.getElementById("novaSenha").value;
      const confirma = document.getElementById("confirmaSenha").value;
      const msg = document.getElementById("msgSenha");
      chrome.storage.local.get("password", (data) => {
        const senhaAtual = data.password || "admin123";
        if (atual !== senhaAtual) { msg.textContent = "Senha atual incorreta."; msg.className = "msg erro"; return; }
        if (nova.length < 4) { msg.textContent = "Mínimo 4 caracteres."; msg.className = "msg erro"; return; }
        if (nova !== confirma) { msg.textContent = "As senhas não coincidem."; msg.className = "msg erro"; return; }
        chrome.storage.local.set({ password: nova }, () => {
          msg.textContent = "✓ Senha alterada com sucesso!";
          msg.className = "msg ok";
          document.getElementById("senhaAtual").value = "";
          document.getElementById("novaSenha").value = "";
          document.getElementById("confirmaSenha").value = "";
          setTimeout(() => { msg.textContent = ""; }, 3000);
        });
      });
    });
  </script>
</body>
</html>
